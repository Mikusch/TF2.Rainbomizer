name: Compile and release

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

env:
  PLUGIN_NAME: rainbomizer
  SCRIPTS_PATH: addons/sourcemod/scripting

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        sm-version: [ '1.12.x' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download include files
        run: |
          set -euo pipefail
          includes=(
            "https://raw.githubusercontent.com/Mikusch/PluginStateManager/refs/heads/master/addons/sourcemod/scripting/include/pluginstatemanager.inc"
          )

          mkdir -p "${{ env.SCRIPTS_PATH }}/include"

          for url in "${includes[@]}"; do
            echo "Downloading $url"
            curl --fail -sSL -O --output-dir "${{ env.SCRIPTS_PATH }}/include" "$url"
          done

      - name: Setup SourcePawn compiler
        id: setup_sp
        uses: rumblefrog/setup-sp@master
        with:
          version: ${{ matrix.sm-version }}
          version-file: ${{ env.SCRIPTS_PATH }}/${{ env.PLUGIN_NAME }}.sp
          define-name: PLUGIN_VERSION

      - name: Compile plugin
        run: |
          set -euo pipefail
          mkdir -p addons/sourcemod/plugins
          spcomp -v2 -E -i "${{ env.SCRIPTS_PATH }}/include" -o "addons/sourcemod/plugins/${{ env.PLUGIN_NAME }}.smx" "${{ env.SCRIPTS_PATH }}/${{ env.PLUGIN_NAME }}.sp"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ matrix.sm-version }}
          path: addons/sourcemod/plugins/${{ env.PLUGIN_NAME }}.smx
          if-no-files-found: error

      - name: Zip output
        if: github.ref_name == 'master' && matrix.sm-version == '1.12.x'
        run: zip -qq -r ${{ github.event.repository.name }}.zip addons

      - name: Create GitHub release
        if: github.ref_name == 'master' && matrix.sm-version == '1.12.x'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.setup_sp.outputs.plugin-version }}
          artifacts: ./${{ github.event.repository.name }}.zip
          draft: true
          allowUpdates: true
          updateOnlyUnreleased: true
          skipIfReleaseExists: true
